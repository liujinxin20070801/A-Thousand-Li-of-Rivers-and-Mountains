<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thousand Li Rivers and Mountains Scroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .scroll-frame {
            width: 800px;
            height: 600px;
            border: 4px solid #333;
            overflow: hidden;
            position: relative;
            background: #fff;
        }
        .scroll-content {
            position: absolute;
            height: 100%;
            background: url('https://img1.doubanpic.com/view/photo/l/public/2573466344.jpg') no-repeat;
            width: 2800px;
            animation: scrollBackForth 35s linear infinite;
        }
        @keyframes scrollBackForth {
            0% {
                left: 0;
            }
            50% {
                left: -2000px;
            }
            100% {
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-frame">
        <div class="scroll-content"></div>
    </div>
</body>
</html>
