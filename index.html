<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thousand Li Rivers and Mountains Scroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .scroll-frame {
            width: 800px;
            height: 600px;
            border: 4px solid #333;
            overflow: hidden;
            position: relative;
            background: #fff;
        }
        .scroll-content {
            position: absolute;
            height: 100%;
            background: url('https://ts1.tc.mm.bing.net/th/id/R-C.b1b3838341567a5fbc2a5d301f015305?rik=KlA0i7Xx7cQngw&riu=http%3a%2f%2fart.people.com.cn%2fNMediaFile%2f2024%2f1009%2fMAIN1728458467319N2185YMBWC.jpg&ehk=klP7GKe7eDBb67f8rNuOJSWCd6ZWXOPq88L2v%2fuYxsk%3d&risl=&pid=ImgRaw&r=0') no-repeat;
            width: 2800px;
            animation: scrollBackForth 35s linear infinite;
        }
        @keyframes scrollBackForth {
            0% {
                left: 0;
            }
            50% {
                left: -2000px;
            }
            100% {
                left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-frame">
        <div class="scroll-content"></div>
    </div>
</body>
</html>
